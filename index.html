<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan & Josselyn - Lista de Novios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --sage: #8A9A81; --sage-dark: #6B7B62; --cream: #FDFBF8; --text-dark: #3A4735; --gold: #C4A77D; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Cormorant Garamond', serif; background-color: var(--cream); color: var(--text-dark); margin: 0; padding-bottom: 140px; }
        
        /* FOTO REDUCIDA (MÁS PEQUEÑA AÚN) */
        .hero { padding: 25px 20px; text-align: center; background: white; border-bottom: 1px solid rgba(196,167,125,0.1); }
        .photo-frame { max-width: 180px; margin: 0 auto 15px; padding: 6px; background: white; border-radius: 90px 90px 5px 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .photo-frame img { width: 100%; border-radius: 85px 85px 3px 3px; display: block; }
        .couple-names { 
            font-family: 'Pinyon Script', cursive; 
            font-size: 3.2em; 
            margin: 0; 
            line-height: 1.6; /* Este ajuste es el que evita que la 'y' se corte */
            padding-bottom: 10px;
            display: block;
        }

        .welcome-text { 
            max-width: 550px; 
            margin: 0 auto; 
            font-size: 1.15em; 
            line-height: 1.6em; 
            font-style: italic; 
            color: #555;
            padding: 0 20px;
        }
        .wedding-date { font-size: 0.85em; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin: 5px 0; }

        /* GRILLA DE 2 COLUMNAS EN MÓVIL */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1000px; margin: 25px auto; padding: 0 12px; }
        .card { background: white; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(196,167,125,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-body { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-body h3 { font-size: 0.9em; margin: 0 0 6px; height: 2.4em; overflow: hidden; line-height: 1.2; font-weight: 600; }
        .precio { font-size: 1.05em; color: var(--sage-dark); font-weight: 600; margin-bottom: 8px; }
        
        button.agregar { background: none; border: 1px solid var(--sage); color: var(--sage-dark); width: 100%; padding: 7px; cursor: pointer; text-transform: uppercase; font-size: 0.65em; letter-spacing: 1px; }
        button.agregar:hover { background: var(--sage); color: white; }

        /* CARRITO Y VOLVER ARRIBA */
        .carrito-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 0; display: flex; justify-content: center; align-items: center; gap: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 100; border-top: 1px solid rgba(196,167,125,0.2); }
        .total-monto { font-size: 1.4em; font-weight: 400; }
        button.pagar { background: var(--sage-dark); color: white; border: none; padding: 12px 25px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; font-size: 0.85em; }

        .btn-top { position: fixed; bottom: 80px; right: 20px; background: white; border: 1px solid var(--gold); color: var(--gold); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration: none; font-size: 1em; }

        /* MODAL */
        #modal-dedicatoria { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(58, 71, 53, 0.9); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--cream); width: 90%; max-width: 450px; padding: 25px; border-radius: 4px; position: relative; text-align: center; box-sizing: border-box; }
        .card-selector { display: flex; gap: 8px; justify-content: center; margin: 15px 0; }
        .card-option { padding: 6px 10px; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; font-size: 0.7em; text-transform: uppercase; background: white; }
        .card-option.selected { border-color: var(--sage-dark); background: var(--sage); color: white; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; font-family: 'Cormorant Garamond'; font-size: 1em; box-sizing: border-box; }
        
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .card img { height: 180px; }
            .photo-frame { max-width: 200px; }
            .couple-names { font-size: 3.5em; }
        }
    </style>
</head>
<body>

    <a href="#seccion-filtros" class="btn-top">↑</a>

    <header class="hero" id="inicio">
        <div class="photo-frame">
            <img src="https://drive.google.com/thumbnail?id=1nHY-TiHU5bo9knGZWpPQhpLRUcHNo0my&sz=w1000" alt="Josselyn & Jordán">
        </div>
        <h1 class="couple-names">Josselyn y Jordán</h1>
        <p class="wedding-date">03 • Octubre • 2026</p>
        <p class="welcome-text">
            Muchas gracias por tu asistencia. A continuación encontrarás nuestra lista de regalos.
        </p>
    </header>

    <div id="seccion-filtros" style="text-align: center; margin: 20px auto; max-width: 1000px; padding: 10px 15px;">
        <select id="ordenar-regalos" onchange="mostrarRegalos()" style="padding: 8px 15px; border: 1px solid var(--sage); color: var(--sage-dark); border-radius: 4px; font-family: 'Cormorant Garamond', serif; font-size: 1.1em; background: white; cursor: pointer; outline: none;">
            <option value="defecto">Ordenar lista por...</option>
            <option value="menor-mayor">Precio: Menor a Mayor</option>
            <option value="mayor-menor">Precio: Mayor a Menor</option>
            <option value="az">Alfabéticamente (A - Z)</option>
        </select>
    </div>

    <div id="contenedor-regalos" class="grid"></div>

    <div class="carrito-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="total-monto">$<span id="total">0</span></div>
            <span id="btn-vaciar" onclick="vaciarCarrito()" style="cursor: pointer; display: none; font-size: 1.4em; title: Vaciar selección;">🗑️</span>
        </div>
        <button class="pagar" onclick="abrirDedicatoria()">Confirmar Regalo</button>
    </div>

   <div id="modal-dedicatoria">
        <div class="modal-content">
            <h2 style="font-weight: 300; margin: 0 0 15px;">Tu Tarjeta de Regalo</h2>

            <input type="text" id="invitado-nombre" placeholder="¿De parte de quién? (Ej: Familia Barriga)">

            <div id="preview-box" style="background: white; padding: 20px; border: 1px solid var(--gold); margin: 20px 0; text-align: center; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                <p style="font-family: 'Cormorant Garamond'; font-style: italic; color: var(--sage-dark); font-size: 1.4em; margin-bottom: 10px;">¡Muchas Felicidades!</p>
                <div style="height: 1px; background: var(--gold); width: 40px; margin: 10px auto; opacity: 0.5;"></div>
                <p style="font-size: 0.7em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">De parte de:</p>
                <h4 id="preview-nombre" style="font-family: 'Pinyon Script'; font-size: 2.2em; margin: 0; color: var(--text-dark);">Tu Nombre</h4>
            </div>

            <div style="font-size: 1.2em; color: var(--sage-dark); margin-bottom: 15px; font-weight: 600;">
                Total a pagar: $<span id="modal-total-monto">0</span>
            </div>

            <button class="pagar" style="width: 100%;" id="btn-final" onclick="procesarPagoFinal()">Confirmar y Pagar</button>
            <p onclick="cerrarModal()" style="margin-top: 15px; cursor: pointer; font-size: 0.8em; text-decoration: underline;">Volver a la lista</p>
        </div>
    </div>
    <script>
        // RECUERDA CAMBIAR ESTA URL POR LA TUYA
        const URL_API = "https://script.google.com/macros/s/AKfycbz1I-usyWZ8B3pZY20u6W8ykTDrlqHms6zbxo06qIICXY942nw9ZtcXPN9uCA41kM3G/exec"; 
        
        let carrito = [];
        let total = 0;
        let tarjetaSeleccionada = "Olivo";
        let todosLosRegalos = []; // Guardamos la lista original para poder ordenarla

        async function cargarRegalos() {
            try {
                const resp = await fetch(URL_API);
                const regalos = await resp.json();
                // Filtramos solo los visibles y los guardamos
                todosLosRegalos = regalos.filter(r => r.Estado === "Visible");
                mostrarRegalos();
            } catch(e) { console.error("Error cargando lista"); }
        }

        function mostrarRegalos() {
            const orden = document.getElementById("ordenar-regalos").value;
            let lista = [...todosLosRegalos]; // Clonamos la lista para no perder la original

            // Aplicamos el ordenamiento seleccionado
            if (orden === "menor-mayor") lista.sort((a, b) => Number(a.Precio) - Number(b.Precio));
            if (orden === "mayor-menor") lista.sort((a, b) => Number(b.Precio) - Number(a.Precio));
            if (orden === "az") lista.sort((a, b) => a.Articulo.localeCompare(b.Articulo));

            let html = "";
            lista.forEach(r => {
                html += `
                    <div class="card">
                        <img src="${r.Imagen_URL}">
                        <div class="card-body">
                            <h3>${r.Articulo}</h3>
                            <p class="precio">$${Number(r.Precio).toLocaleString('es-CL')}</p>
                            <button class="agregar" onclick="agregarAlCarrito('${r.Articulo}', ${r.Precio})">Añadir</button>
                        </div>
                    </div>`;
            });
            document.getElementById("contenedor-regalos").innerHTML = html || "<p>Pronto tendremos novedades.</p>";
        }

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            total += precio;
            actualizarInterfazCarrito();
        }

        function vaciarCarrito() {
            carrito = [];
            total = 0;
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            document.getElementById("total").innerText = total.toLocaleString('es-CL');
            // Si hay cosas en el carrito, mostramos el basurero
            document.getElementById("btn-vaciar").style.display = carrito.length > 0 ? "inline-block" : "none";
        }

        function abrirDedicatoria() {
            if(carrito.length === 0) return alert("Selecciona un regalo primero.");
            document.getElementById("modal-dedicatoria").style.display = "flex";
        }

        function cerrarModal() { document.getElementById("modal-dedicatoria").style.display = "none"; }

        function selectCard(el, nombre) {
            document.querySelectorAll('.card-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            tarjetaSeleccionada = nombre;
        }

        async function procesarPagoFinal() {
            const nombre = document.getElementById('invitado-nombre').value;
            if(!nombre) return alert("Por favor, dinos tu nombre para la tarjeta.");

            const btn = document.getElementById('btn-final');
            btn.innerText = "Conectando..."; btn.disabled = true;

            try {
                const resp = await fetch(URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ carrito, total, nombre, tarjeta: tarjetaSeleccionada })
                });
                const d = await resp.json();
                if(d.urlPago) {
                    window.location.replace(d.urlPago);
                } else {
                    alert("Error MP: " + d.error);
                    btn.innerText = "Confirmar y Pagar"; btn.disabled = false;
                }
            } catch(e) { 
                alert("Error de conexión."); 
                btn.innerText = "Confirmar y Pagar"; btn.disabled = false;
            }
        }

        // Listener para la vista previa
        document.getElementById('invitado-nombre').addEventListener('input', (e) => {
            document.getElementById('preview-nombre').innerText = e.target.value || "Tu Nombre";
        });
        cargarRegalos();
    </script>
</body>
</html>
