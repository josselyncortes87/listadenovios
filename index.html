<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Lista de Deseos - Jordan & Josselyn</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sage: #8A9A81;
            --sage-dark: #6B7B62;
            --cream: #FDFBF8;
            --text-dark: #3A4735;
            --gold: #C4A77D;
        }

        body { font-family: 'Cormorant Garamond', serif; background-color: var(--cream); color: var(--text-dark); margin: 0; padding-bottom: 140px; }
        
        /* --- HEADER (HERO SECTION) --- */
        .hero { position: relative; background-color: #fff; padding: 60px 20px; text-align: center; border-bottom: 1px solid rgba(196, 167, 125, 0.2); }
        
        .photo-frame { max-width: 600px; margin: 0 auto 40px auto; padding: 15px; background: white; border-radius: 100px 100px 5px 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative;}
        .photo-frame::before { content: '🌿'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 2.5em; color: var(--sage); }
        .photo-frame img { width: 100%; height: auto; border-radius: 90px 90px 5px 5px; object-fit: cover; display: block; }

        .couple-names { font-family: 'Pinyon Script', cursive; color: var(--text-dark); font-size: 4.5em; margin: 0; line-height: 1em; }
        .wedding-date { font-size: 1.3em; text-transform: uppercase; letter-spacing: 4px; color: var(--gold); margin: 15px 0 5px 0; }
        .venue-info { font-style: italic; color: #7f8c8d; font-size: 1.1em; margin-bottom: 20px; }
        .welcome-text { max-width: 600px; margin: 0 auto; font-size: 1.2em; line-height: 1.6em; }

        /* --- SECCIÓN DE REGALOS --- */
        .grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; max-width: 1200px; margin: auto; padding: 20px;}
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.04); width: 280px; text-align: left; transition: all 0.3s ease; border: 1px solid rgba(196, 167, 125, 0.1); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(138, 154, 129, 0.15); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 25px; }
        .card-body h3 { margin: 0 0 12px 0; font-size: 1.2em; height: 2.4em; overflow: hidden; }
        .precio { font-size: 1.5em; font-weight: 400; color: var(--sage-dark); margin-bottom: 20px; }
        
        button.agregar { background-color: transparent; color: var(--sage-dark); border: 1px solid var(--sage); padding: 12px; border-radius: 4px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; }
        button.agregar:hover { background-color: var(--sage); color: white; }
        
        /* --- CARRITO FLOTANTE --- */
        .carrito-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(253, 251, 248, 0.95); padding: 25px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; gap: 40px; z-index: 1000; backdrop-filter: blur(5px); border-top: 1px solid rgba(196, 167, 125, 0.2); }
        .total-monto { font-size: 2.2em; font-weight: 300; color: var(--text-dark); }
        button.pagar { background-color: var(--sage-dark); color: white; border: none; padding: 18px 50px; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: all 0.3s; }
        button.pagar:hover { background-color: var(--text-dark); transform: scale(1.03); }

        @media (max-width: 768px) {
            .couple-names { font-size: 3em; }
            .carrito-bar { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="photo-frame">
            <img src="https://drive.google.com/thumbnail?id=1nHY-TiHU5bo9knGZWpPQhpLRUcHNo0my&sz=w1000" alt="Jordan & Josselyn">
        </div>
        <h1 class="couple-names">Jordan & Josselyn</h1>
        <p class="wedding-date">03 • Octubre • 2026</p>
        <p class="venue-info">Casona Fundo El Rosario</p>
        <p class="welcome-text">Nuestra mayor alegría es compartir este día con ustedes. Si desean tener un detalle con nosotros, esta es nuestra lista de deseos para nuestro futuro hogar.</p>
    </header>
    
    <main class="main-content">
        <div id="contenedor-regalos" class="grid"></div>
    </main>

    <div class="carrito-bar">
        <div class="total-container">
            <span class="total-monto">$<span id="total">0</span></span>
        </div>
        <button class="pagar" onclick="irAPagar()">Confirmar Mi Regalo</button>
    </div>

    <script>
        const URL_API = "https://script.google.com/macros/s/AKfycbz1I-usyWZ8B3pZY20u6W8ykTDrlqHms6zbxo06qIICXY942nw9ZtcXPN9uCA41kM3G/exec"; 
        let carrito = [];
        let total = 0;

        async function cargarRegalos() {
            try {
                const respuesta = await fetch(URL_API);
                const regalos = await respuesta.json();
                let html = "";
                regalos.forEach(regalo => {
                    if(regalo.Estado === "Visible") {
                        html += `
                            <div class="card">
                                <img src="${regalo.Imagen_URL}" alt="${regalo.Articulo}">
                                <div class="card-body">
                                    <h3>${regalo.Articulo}</h3>
                                    <p class="precio">$${Number(regalo.Precio).toLocaleString('es-CL')}</p>
                                    <button class="agregar" onclick="agregarAlCarrito('${regalo.Articulo}', ${regalo.Precio})">Añadir al regalo</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById("contenedor-regalos").innerHTML = html;
            } catch(e) { console.error(e); }
        }

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio, cantidad: 1 });
            total += precio;
            document.getElementById("total").innerText = total.toLocaleString('es-CL');
        }

        async function irAPagar() {
            if(carrito.length === 0) return alert("Selecciona un regalo.");
            const btn = document.querySelector('.pagar');
            btn.innerText = "Cargando..."; btn.disabled = true;
            try {
                const resp = await fetch(URL_API, { method: 'POST', body: JSON.stringify({ carrito }) });
                const datos = await resp.json();
                if(datos.urlPago) window.location.href = datos.urlPago;
            } catch (e) { alert("Error al conectar."); btn.disabled = false; }
        }
        cargarRegalos();
    </script>
</body>
</html>
