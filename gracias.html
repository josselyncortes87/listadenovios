<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! - Jordan & Josselyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --sage: #8A9A81; --cream: #FDFBF8; --text-dark: #3A4735; --gold: #C4A77D; }
        body { font-family: 'Cormorant Garamond', serif; background-color: var(--cream); color: var(--text-dark); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; }
        .box { background: white; padding: 50px 30px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(196,167,125,0.2); max-width: 500px; }
        h1 { font-family: 'Pinyon Script', cursive; font-size: 3.5em; margin: 0 0 10px; color: var(--sage-dark); }
        p { font-size: 1.2em; line-height: 1.6; margin-bottom: 25px; }
        a { display: inline-block; background: var(--sage-dark); color: white; text-decoration: none; padding: 12px 30px; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; font-size: 0.9em; transition: 0.3s; }
        a:hover { background: var(--text-dark); }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 3em; margin-bottom: 10px;">✨</div>
        <h1>¡Muchas Gracias!</h1>
        <p>Hemos recibido la confirmación de tu regalo. Valoramos tu detalle y cariño para nuestra nueva etapa...¡Lo disfrutaremos mucho!</p>
        <br>
        <a href="index.html">Volver al inicio</a>
    </div>
</body>
</html>
